name: CI

on:
  push:
    branches:
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - master

jobs:
  api-test:
    name: API — unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.4.0

      - uses: actions/setup-node@v5.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Run unit tests
        run: npm test -- --testPathPattern="src/tests/utils" --forceExit
        working-directory: api
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

      # Integration tests (src/tests/integration/) are intentionally excluded from CI.
      # They call handler functions in-process against a live Azurite instance and are
      # designed to run locally before pushing:
      #   cd api && npm test -- --testPathPattern="src/tests/integration"

  frontend-check:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.4.0

      - uses: actions/setup-node@v5.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build (includes tsc type-check)
        run: npm run build
        working-directory: frontend
